test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Railway private S3-compatible buckets (also works with AWS S3, R2, MinIO, etc.)
# Credentials are read from environment variables. Set S3_ENDPOINT and
# S3_FORCE_PATH_STYLE=true for non-AWS S3-compatible providers.
amazon:
  service: S3
  access_key_id: <%= ENV["S3_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["S3_SECRET_ACCESS_KEY"] %>
  region: <%= ENV["S3_REGION"] || "us-east-1" %>
  bucket: <%= ENV["S3_BUCKET_NAME"] %>
  endpoint: <%= ENV["S3_ENDPOINT"] %>
  force_path_style: <%= ENV["S3_FORCE_PATH_STYLE"] == "true" %>