<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Spanner</title>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/lato-font/3.0.0/css/lato-font.min.css"
			integrity="sha512-rSWTr6dChYCbhpHaT1hg2tf4re2jUxBWTuZbujxKg96+T87KQJriMzBzW5aqcb8jmzBhhNSx4XYGA6/Y+ok1vQ=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
		<script>
			const setTheme = (theme, prefers) => {
				document.documentElement.classList.remove('dark', 'light');

				if (prefers) {
					document.documentElement.classList.add(theme);
				}
			};

			const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
			prefersDark.addEventListener('change', (event) => {
				setTheme('dark', event.matches);
			});
			setTheme('dark', prefersDark.matches);
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div class="root">%sveltekit.body%</div>
	</body>
</html>
